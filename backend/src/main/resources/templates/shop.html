<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Inventory - ForYou</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .table-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-title { color: #d63384; font-weight: bold; } /* A nice pink for a clothing store! */
    </style>
</head>
<body class="container py-5">

<div class="table-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="header-title">Current Inventory</h2>
        <a th:href="@{/admin/add-product}" class="btn btn-outline-primary">+ Add New Item</a>
    </div>

    <table class="table table-hover">
        <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Material</th>
            <th>Description</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${allProducts}">
            <td th:text="${p.id}">1</td>
            <td class="fw-bold" th:text="${p.name}">Silk Robe</td>
            <td>
                        <span class="badge bg-info text-dark"
                              th:text="${p.category != null ? p.category.name : 'Uncategorized'}">
                        </span>
            </td>
            <td th:text="${p.material}">Silk</td>
            <td class="text-muted" th:text="${p.description}">Beautiful nightwear...</td>
        </tr>

        <tr th:if="${#lists.isEmpty(allProducts)}">
            <td colspan="5" class="text-center text-muted py-4">No products found in the database.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
