# ============================================================
# Production profile ? activated by SPRING_PROFILES_ACTIVE=prod
# All properties here override application.properties on Render.
# ============================================================

# --- Secrets: no fallback defaults. App refuses to start if these are missing. ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
app.admin.password=${ADMIN_PASSWORD}

# --- Silence SQL logging ---
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# --- Hide error internals from API responses ---
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# --- Disable sample data seeding ---
app.seeding.enabled=false

