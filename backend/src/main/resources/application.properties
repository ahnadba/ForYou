spring.application.name=foryou
# Database connection
# Keep secrets out of source control by reading credentials from environment variables.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/for-you}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:ahmad}

# 2. The "Magic" Table Creator
# Use 'create' for this first run to force PostgreSQL to build everything.
# We will change it back to 'update' later.
spring.jpa.hibernate.ddl-auto=update

# 3. The 2026 Dialect (Tells Spring exactly how to talk to Postgres)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 4. Debugging (This will show the "CREATE TABLE" commands in your console)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
# Admin panel password. Override with ADMIN_PASSWORD outside local development.
app.admin.password=${ADMIN_PASSWORD:ahmad}

