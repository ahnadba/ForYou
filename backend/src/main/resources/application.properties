spring.application.name=foryou
server.port=${PORT:8080}
# Database connection
# Keep secrets out of source control by reading credentials from environment variables.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/for-you}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:ahmad}

spring.jpa.hibernate.ddl-auto=update

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SQL logging (local dev only ? overridden to WARN in application-prod.properties)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
# Admin panel password. Override with ADMIN_PASSWORD outside local development.
app.admin.password=${ADMIN_PASSWORD:ahmad}

# Allowed CORS origins (comma-separated). Override with APP_ALLOWED_ORIGINS in production.
app.cors.allowed-origins=${APP_ALLOWED_ORIGINS:https://<my-frontend>.vercel.app,http://localhost:5173,http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500}

